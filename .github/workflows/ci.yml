name: CI Pipeline

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Make gradlew executable
        run: chmod +x ./gradlew
          
      - name: Build
        run: ./gradlew compileJava
        
      - name: Run Tests
        run: ./gradlew test
        
      - name: Check Formatting
        run: ./gradlew spotlessCheck